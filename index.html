<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>油茶籽榨油坊管理系统</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">🌰</div>
                <h1>油茶籽榨油坊</h1>
            </div>
            <nav class="nav-menu">
                <ul>
                    <li class="nav-item active" data-page="purchase">
                        <span class="nav-icon">📥</span>
                        <span class="nav-text">茶籽收购</span>
                    </li>
                    <li class="nav-item" data-page="drying">
                        <span class="nav-icon">☀️</span>
                        <span class="nav-text">晾晒去壳</span>
                    </li>
                    <li class="nav-item" data-page="pressing">
                        <span class="nav-icon">⚙️</span>
                        <span class="nav-text">炒籽压榨</span>
                    </li>
                    <li class="nav-item" data-page="filtering">
                        <span class="nav-icon">🧪</span>
                        <span class="nav-text">毛油过滤</span>
                    </li>
                    <li class="nav-item" data-page="refining">
                        <span class="nav-icon">🏺</span>
                        <span class="nav-text">精炼灌装</span>
                    </li>
                    <li class="nav-item" data-page="cake">
                        <span class="nav-icon">🥮</span>
                        <span class="nav-text">茶枯处理</span>
                    </li>
                    <li class="nav-item" data-page="sales">
                        <span class="nav-icon">📊</span>
                        <span class="nav-text">销售台账</span>
                    </li>
                </ul>
            </nav>
            <div class="sidebar-footer">
                <div class="today-overview">
                    <div class="overview-title">📊 今日经营概览</div>
                    <div class="overview-item" data-page="purchase" onclick="App.goToPage('purchase')">
                        <div class="overview-icon">📥</div>
                        <div class="overview-info">
                            <div class="overview-label">今日收购</div>
                            <div class="overview-value" id="todayPurchase">0 kg</div>
                        </div>
                        <span class="overview-arrow">›</span>
                    </div>
                    <div class="overview-item" data-page="pressing" onclick="App.goToPage('pressing')">
                        <div class="overview-icon">🛢️</div>
                        <div class="overview-info">
                            <div class="overview-label">今日压榨出油</div>
                            <div class="overview-value" id="todayOil">0 kg</div>
                        </div>
                        <span class="overview-arrow">›</span>
                    </div>
                    <div class="overview-item" data-page="refining" onclick="App.goToPage('refining')">
                        <div class="overview-icon">🍶</div>
                        <div class="overview-info">
                            <div class="overview-label">今日灌装</div>
                            <div class="overview-value" id="todayBottling">0 瓶</div>
                        </div>
                        <span class="overview-arrow">›</span>
                    </div>
                    <div class="overview-item" data-page="sales" onclick="App.goToPage('sales')">
                        <div class="overview-icon">💰</div>
                        <div class="overview-info">
                            <div class="overview-label">今日销售额</div>
                            <div class="overview-value" id="todaySales">¥0</div>
                        </div>
                        <span class="overview-arrow">›</span>
                    </div>
                    <div class="overview-item warning" data-page="sales" onclick="App.goToPage('sales')">
                        <div class="overview-icon">⚠️</div>
                        <div class="overview-info">
                            <div class="overview-label">库存预警</div>
                            <div class="overview-value" id="stockWarning">0 种</div>
                        </div>
                        <span class="overview-arrow">›</span>
                    </div>
                </div>
            </div>
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <div class="page-title">
                    <h2 id="pageTitle">茶籽收购</h2>
                    <p id="pageSubtitle">油茶籽过磅收购与农户来料代榨管理</p>
                </div>
                <div class="top-actions">
                    <span class="date-display" id="currentDate"></span>
                </div>
            </header>

            <div class="content-area" id="contentArea">
            </div>
        </main>
    </div>

    <div class="modal" id="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modalTitle">标题</h3>
                <span class="modal-close" id="modalClose">&times;</span>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="js/storage.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/pages/purchase.js"></script>
    <script src="js/pages/drying.js"></script>
    <script src="js/pages/pressing.js"></script>
    <script src="js/pages/filtering.js"></script>
    <script src="js/pages/refining.js"></script>
    <script src="js/pages/cake.js"></script>
    <script src="js/pages/sales.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
